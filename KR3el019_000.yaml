front:
  text: 序三折肱為良醫九折臂為良醫盲史湘纍吐能言之則治打撲折傷者古之良醫也周官有折瘍之祝藥焉政論有續骨之膏焉而本草鴻然吐言地黃屬骨而甘草生肉祝藥膏藥聖賢所教何曾無效乎雖然骨折骸碎節脫筋斷其所傷者在子腠之內而藥施諸皮膚之外不近似隔履搔癢乎豫曾論之人身之與家國其理一致動履平寧者太平清明之象也其失常不快者禍亂之象也內證者內亂也外證者外寇也病之得於喜怒飲食者猶枉席沉蠱之禍朝政廢缺之害也病之得於風寒暑濕者猶夷狄內侵之禍諸侯叛逆之亂也若夫打撲傷損之類是非內患又非外懼是猶星隕地震海嘯山崩之變水火饑饉之災乎是宜別有其法焉豈可比諸內外之治術乎是故趙宋始有正骨科焉至明又有接骨科焉其法載於聖濟證治之諸書近世醫宗金鑑所載摸接端提按摩推拿之八法是豫所謂別得其治者也唯恨其法未得精細耳濱田醫官二宮彥可博學篤志精於其業曾西遊至於長崎師事吉原吉隱得正骨之術杏隱元武夫也擴充其曾所學死活拳法以建其法彥可盡傳其祕蘊東歸之後屢驗諸患者桴鼓相應十愈八九遂以良聞頃原其師說加之以其所自得者著中國接骨圖說二卷請序於豫豫閲之其書探珠弄玉靡風車轉圓旋螺旋躍魚游魚熊顧鸞翔鶴跨騎龍燕尾鴒尾尺蠖諸法焉母法十五子法三十六合五十一法矣有圖而象之有說而解之又別建揉法百五十法焉富哉術也比諸金鑑諸書所載則猶金罍玉爵之於汗尊杯飲邪杏隱海隅隱士懷抱奇術遁戢不出銷名幽藪然得彥可而顯於天下豈不為大幸乎今之醫生匿其師傳以為自得詡詡夸人釣譽於世以弋身家之腴者比比有之甚則至彎射羿之弓焉彥可則不然著其書而顯其師比諸彼徒豈不亦天冠地履乎豫於此書不獨喜其術之精而有青藍之譽焉又以喜意出於敦厚慕君子長者之風者乎文化五年戊長夏旺日丹波元簡廉夫氏撰序吾家五世以外科承乏傳醫專奉西洋氏之方而漢洋二書諸門方法旁搜廣討略無遺漏獨於整骨一門漢氏未能詳悉洋氏多用器械未詳悉者難施之治用器械者苦其難得長崎有杏隱老人專以手法整理骨傷善生其創意吾友濱田二宮彥可從杏隱老人盡受其方救患起廢其功不勘令兒國寶及弟子輩學其方吾家今用之矣近日彥可作接骨圖說上下篇圖說兼優又附載裹簾之法此吾家所傳彥可學而用之者也余欣然為之序文化丙寅夏六月東都傳醫法眼兼醫學瘍科教諭桂園瑞序古人有曰折傷打撲者非疾然而其治療不得法則遂陷非命之死即不至死亦不免廢者豈可輕忽之哉余嘗客遊於肥之長崎得阿蘭象胥長吉雄耕牛而馭談及正骨手法耕牛曰西洋雖有正骨法獨巧用械而手法則付之不講我長崎有杏蔭齊先生其人元武辨姓吉原名元楝字隆仙達於所謂死活券法今隱於方伎以按蹻為業因其所得券法潛心正骨多年終得其奧妙合縫接折其效不可勝記也嘗見療一舂夫以杵撞睪丸絶死衆醫不能救者先生一下手於小腹按之則忽然蘇恰如喚起沉睡者然其手法之妙概此類矣僕舊相識足下若願見之則請為紹介余曰素所欲也於是委贄門下得學其術母法十三子法十八道既通將東歸先生囑余曰余已創此手法未有成書之可以遺於後昆者吾齡在桑榆汝能繼吾志乃盡取其祕蘊授焉於是覃思研精二十餘年更增益為母法十五子法三十又六又新立揉法一百五十施之人則擊撲跌蹶復舊者十而八九其或復亦不至廢此皆因先生之創意祕蘊非余之妄作者也凡學此術者勿忘先生之高德嗚呼夫正骨之用也廣矣如稠人雜沓之地士人演武之場碰撞攧撲常有則不獨醫生雖諸凡士庶亦學習斯術其益不勘而已故不吝其奧祕壽之梓公於宇內云爾文化四年丁卯季冬濱田侯醫臣二宮獻撰
