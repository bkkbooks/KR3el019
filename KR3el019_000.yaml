body:
  text: 接骨總論接骨或稱正骨或稱整骨皆謂整所跌撲損傷之骨節也宋時始有正骨科至明又立接骨科聖濟總録證治準繩醫宗金鑑等書可考金鑑特載摸接端提按摩推拿之八法而未為詳備今以金鑑八法為經新立母法十五子法三十六以為緯凡三百六十五節之傷損者無所逃於此手法夫手法者何也謂以兩手使所傷之骨節仍復於舊也但傷有輕重而手法各有所宜其復舊之遲速及遺留殘疾與否皆關手法所施之巧拙也蓋一身之骨節非一致而筋脈羅列又各不同故能知其骨節識其部位一旦臨證機觸於外巧生於內手隨心轉法從手出或拽之離而復合或推之就而復位或正其斜或完其闕則骨之截斷碎斷斜斷筋之弛縱卷攣翻轉離合雖在肉裡以手運轉推拿之自適其情是稱為手法也手法亦不可妄施若元氣素弱一旦被傷勢已難支設手法再誤則萬難挽回於是別有揉法百五十法心明手巧既知其病情復善用其法然後治自多效誠其宛轉運用之妙要以一己之卷舒高下疾徐輕重開合能達病者之血氣凝滯皮肉腫痛筋骨攣折與情志之苦欲也故不口授面命則難得其法矣檢骨先問其為跌撲或為錯閃或為打撞摸檢其所傷之骨節知其骨脫骨斷骨碎骨歪骨整骨軟骨硬而後以手法治之是正骨家檢骨之大要也最不可孟浪也夫人之周身有三百六十五骨節以一百六十五字都關次之首自鈴骨之上為頭左右前後至轅骨以四十九字共關七十二骨巔中為都顱骨者一次顱為髏骨者一髏前為頂威骨者一髏後腦骨者一腦左枕骨者一枕就之中附下為天蓋骨者一蓋骨之後為天柱骨者一蓋前為言骨者一言下為舌本骨者左右共二髏前為囟骨者一囟下為伏委骨者一伏委之下為俊骨者一眉上左為天賢骨者一眉上右為天貴骨者一左睛之上為智宮骨者一右睛之上為命門骨者一鼻之前為梁骨者一梁之左為顴骨者一梁之左為糾骨者一梁之端為嵩柱骨者一左耳為司正骨者一右耳為納邪骨者一正邪之後為完骨者左右共二正邪之上附內為嚏骨者一嚏後之上為通骨者左右前後共四嚏上為齶骨者一其齶後連屬為頷也左頷為乘骨者一右頷為車骨者一乘車之後為轅骨者左右共二乘車上下山齒牙三十六事復次鈴骨之下為膻中左中前後至蓧以四十字關九十七骨轅骨之下左右為鈴骨者二鈴中為會厭骨者一鈴中之下為咽骨者左中及右共三咽下為喉骨者左中及右共三喉下為嚨骨者環次共十事嚨下之內為肺系骨者纍纍然共十二肺系之後為谷骨者一谷下為人鬲道骨者左右共二嚨外次下為順骨者共八順骨之端為順隱骨者共八順下之左為洞骨者一順下之右為棚骨者一洞棚之下中央為𩩲骭骨者一𩩲骭直下為天樞骨者一鈴下之左右為缺盆骨者二左缺盆前之下為下猒骨者一右缺盆前之下為分膳骨者一猒膳之後附下為倉骨者一倉之下左右為髎骨者共八髎下之左為胸骨者一髎下之右為蕩骨者一胸之下為烏骨者一蕩之下為臆骨者一鈴中之後為脊窳骨者共二十二脊窳次下為大動骨者一大動之端為歸下骨者一歸下之後為篡骨者一歸下之前為蓧骨者一復次缺盆之下左右至襯以二十五字關六十骨支其缺盆之後為傴甲骨者左右共二傴甲之端為甲隱骨者左右共二前支缺盆為飛動骨者左右共二次飛動之左為龍臑骨者一次飛動之右為虎沖骨者一龍臑之下為龍本骨者一虎沖之下為虎端骨者一本端之下為腕也龍本內為進賢骨者一虎端上內為及爵骨者一腕前左右為上力骨者共八次上力為駐骨者左右共十次駐骨為搦骨者左右共十次搦為助勢骨者左右共十爪甲之下各有襯骨左右共十復次𩩲骭之下左右前後至初步以五十一字關一百三十六骨此下至兩乳下分左右自兩足心衆骨所會處也𩩲骭之下為心蔽骨者一𩩲骭之左為脅骨者上下共十二左脅之端各有脅隱骨者分次亦十二脅骨之下為季脅骨者共二季脅之端為季隱骨者共二𩩲骭之右為肋骨者共十二肋骨之下為䏚肋骨者共二右肋之端為肋隱骨者共十二蓧骨之前為大橫骨者一橫骨之前為白環骨者共二白環之前為內輔骨者左右共二內輔之後為骸關骨者左右共二骸關之下為捷骨者左右共二捷骨之下為髀樞骨者左右共二髀樞下端為膝蓋骨者左右共二膝蓋左右各有俠升骨者共二髀樞之下為䯒骨者左右共二䯒骨之外為外輔骨者左右共二䯒骨之下為立骨者左右共二立骨左右各有內外踝骨者共四踝骨之前各有下力骨者左右共十踝骨之後各有京骨者左右共二下力有釋欹骨者共十釋欹之前各有起僕骨者共十起僕之前各有平助骨者左右共十平助之前各有襯甲骨者左右共十釋欹兩傍各有核骨者左右共二起僕之下各有初步骨者左右共二凡此三百六十五骨也天地相乘惟人至靈其女人則無頂威左洞右棚及初步等五骨止有三百六十骨又男子女人一百九十骨或隱或襯或無髓勢餘二百五十六骨並有髓液以藏諸筋以會諸脈溪谷相需而成身形謂之四大此骨度之常也顛骨者頭頂也其骨男子三叉縫女子十字縫位居至高內函腦髓如蓋故名天靈蓋以統全體者也或碰撞損傷骨碎破者必死或卒然暈倒身體強直口鼻有出入聲氣雖目閉面如土色心口溫熱跳動者可治切不可撅拿並扶起惟宜屈膝側臥先徐徐用揉法後熊顧子法第二整理之囪骨者嬰兒頂骨未合軟而跳動之處名曰囪門或打撲損傷骨縫雖綻尚未震傷腦髓筋未振轉者生治法類顛骨大凡嬰孩之手法者皆貴揉法山角骨即頭頂兩傍稜骨也攧撲損傷骨碎破者死骨未破則雖宣紫腫硬瘀血凝聚疼痛或有昏迷目閉不能起聲氣短少語言不出心中慌亂唾臥喘促飲食少進者可治用揉法須輕輕凌雲骨在前髮際下即正中額骨其兩眉上之骨左名天賢骨右名天貴骨兩額骨也打撲損傷者面目浮腫若內傷者瘀血上而吐衄昏沉不省人事治同山角骨晴明骨即目窠四圍目眶骨也其上曰眉稜骨其下曰䪼骨䪼骨下接上牙床打僕損傷血流滿面或骨碎眼胞損傷瞳神破碎者難治兩顴骨者面上兩旁之高起大骨也擊僕損傷青腫堅硬疼痛或牙車緊急嚼物艱難或鼻孔出血或兩唇掀翻者治骨破碎者不治鼻梁骨者鼻孔之界骨也下至鼻之盡處名曰準頭或打撲鼻兩孔傷鼻梁骨凹陷者可治血出無妨若跌磕傷開鼻竅或鼻被傷落者亦無不治中血堂即鼻內頞下脆骨空虛處也雖被打撲傷損神氣迷昏者無妨血流不止者危地閣骨即兩牙車相交之骨又名頦俗名下巴骨上載齒牙打撲損傷者腮唇腫痛牙車振動雖目閉神昏或心熱神亂氣弱體軟煮亦無不治齒者口齦所生之骨也又名曰牙有門牙虎牙槽牙上下盡根牙之別凡被跌打砍磕落去牙齒如走馬牙疳出血不止者至危扶桑骨即兩額骨旁近太陽肉內凹處也若跌僕損傷或掀腫或血出或青紫堅硬頭疼耳鳴青痕滿面憎寒惡冷心中發熱若撞撲傷凹骨碎透內者死頰車骨即下牙床骨也俗名牙鉤承載諸齒能咀食物有運動之象故名頰車其骨尾形如鉤上控於曲頰之環其曲頰名兩鉤骨即上頰之合鉗以納下牙車骨尾之鉤者也其上名玉梁骨即耳門骨也或打僕脫鉤臼或因風濕襲入鉤環脫臼單脫者為錯雙脫者為落若缺而脫臼者乃突滑也無妨脫臼者名架風又落下頦俗名吊下巴缺又云打哈氣探珠母子法整頓之後山骨即頭後枕骨也其骨形狀不同或如品字或如山字或如川字或圓尖或月牙形或偃月形或雞子形皆屬枕骨凡有傷損其人頭昏目眩耳鳴有聲項強咽直飲食難進坐臥不安者先用揉法整之後熊顧子法第二正之如誤從高處墜下後山骨傷太重筋翻氣促痰向如拽鋸之聲垂頭目閉有喘聲者此風熱所乘至危之證不能治也遺尿者必亡惟月牙形者更易受傷如被墜墮打傷震動蓋頂骨縫以致腦筋轉擰疼痛昏迷不省人事少時或明者其人可治壽臺骨即完骨在耳後接於耳之玉樓骨者也若跌打損傷其耳上下俱腫起耳內之禁骨有傷則見血膿水耳外瘀聚凝結疼痛筋結不能舒通以致頭暈眼迷兩太陽扶桑骨脹痛頸項筋強虛浮紅紫精神短少四肢無力坐臥不安者先用揉法整之後熊顧子法第三端理之旋臺骨又名玉柱骨即頭後頸骨三節也一名天柱骨此骨被傷共分五證一曰從高墜下致頸骨插入腔內而左右廢活動者用熊顧子法第一拔提之二曰打傷頭低不起用熊顧母法整理之三曰墜墮左右歪邪項強不能顧者熊顧母法提顧之四曰僕傷面仰頭不能乘或筋長骨錯或筋聚或筋強者用熊顧子法第二端之五曰自縊者旦至暮心下若微溫者可治暮至旦雖心下微溫不可治徐徐抱解不能截繩上下安被臥之用熊顧子法第三整理之𩪇子骨經名柱骨橫臥於兩肩前缺盆之外其兩端外接肩解擊打損傷或驅馬誤墜於地或從高墜下或撞撲砍磕骨斷骨叉乘者用車轉子法第八整之胸骨即𩩲骭骨乃胸脅衆骨之統名也一名膺骨一名臆骨俗名胸膛其兩側自腋而下至肋骨之盡處統名曰脅脅下小肋骨名曰季脅季肋俗名軟肋肋者單條骨之謂也統脅肋之總又名曰胠凡胸骨被物從前面撞打跌僕者重從後面撞僕者輕輕者用揉法治之重者骨斷骨叉乘用靡風子法第三整理之兩乳上骨傷者用靡風子法第二治之若傷重者內透胸中傷心肺兩藏其人氣亂昏迷閉目嘔吐血水厄逆戰栗者則危在旦夕不可醫治矣岐骨者即兩鳧骨端相接之處其下即鳩尾骨也內近心君最忌觸犯或打撲損傷骨閃錯輕者用靡風子法第一治之重者必入心藏致神昏目閉不省人事牙關緊閉痰喘鼻搧久而不醒醒而神亂此血瘀而堅凝不行者也難以回生鳧骨者即胸下之邊肋上下二條易被損傷左右皆然自此以上有肘臂護之打撲傷損用靡風母法端之在下近腹者鶴跨母法亦可背骨者自後身大椎骨以下腰以上之通稱也其骨一名脊骨一名膂骨俗呼脊梁骨其形一條居中共二十一節下盡尻骨之端上載兩肩內系藏府其兩旁諸骨附接橫疊而彎合於前則為胸脅也跌打傷損瘀聚凝結若脊筋隴起骨縫必錯則不可能俯仰者用鶴跨跨母法整頓之或有為傴僂之形者用鶴子法整理之腰骨即脊骨十四椎十五椎十六椎間骨也若跌打損傷瘀聚凝結身必俯臥若欲仰臥側臥皆不能也疼痛難忍腰筋僵硬者騎龍母法治之尾骶骨即尻骨也其形上寬下窄上承腰脊諸骨兩旁各有孔名曰八髎其末筋名曰尾閭一名骶端一名撅骨一名窮骨俗名尾樁或打撲跌蹶或蹲墊骨錯壅腫者用騎龍母法髃骨者肩端之骨即肩胛骨臼端之上稜骨也其臼含納臑骨上端其處名肩解即肩䯋與臑骨合縫處俗名吞口一名肩頭若被跌傷手必屈轉向後骨縫裂開不能招舉亦不能向前惟扭於肋後而已其氣血皆壅聚於肘肘腫如椎不移者用車轉子法第六整頓或脫臼手麻木髃骨突出者用車轉子法第一歸窠或打撲髃骨閃錯手不能舉疼痛者車轉母法整理之或筋翻筋攣筋脹髃骨膠結不能離脅肋者用車轉子法第二轉之或損傷經數日而髃骨腫硬臑肘瘀血凝滯如針刺者車轉子法第三撥轉之髃骨錯出於後筋攣筋脹膠結不動者車轉子法第四挫頓之肩髃合縫高出難用運轉之手法者車轉子法第五整理之雖髃骨不脫臼不骨突出前後上下運轉不如意筋脈攣急者車轉子法第七治之肩胛骨肩髃之下附於脊背成片如翅者名肩胛亦名肩髆亦名鍁板子骨打撲攧蹶骨失位腫硬者用鸞翔之法整頓之臑骨即肩下肘上之骨也自肩下至手腕一名肱俗名胳膊乃上身兩大支之通稱也或墜馬跌碎或打斷或斜裂或截斷或碎斷打斷者有碎骨跌斷者無碎骨先用揉法整之將杉籬裹簾法縛之肘骨者胳膊中節上下支骨交接處俗名鵝鼻骨若跌傷其肘尖向上突出疼痛不止先用圓旋子法第三挫頓後用旋母法正之肘骨脫臼手垂不能舉臂腕麻木或冷涼用圓旋母法整之肘骨屈不伸其筋斜彎者用圓旋子法第一曳之肘尖骨向上破皮肉突出經日不復腫硬筋攣不伸臂腕失政者用圓旋子法第二擊頓之後用圓母法整理之老人婦人小兒者用圓旋子法第四整之臂骨者自肘至腕有正輔二根其在下而形體長大連肘尖者為臂骨其在上而形體短細者為輔骨俗名纏骨疊並相倚俱下接於腕骨焉凡臂骨受傷者多因迎擊而斷也或斷臂輔二骨或惟斷一骨先用揉法端之後用杉籬裹簾法腕骨即掌骨乃五指之本節也一名壅骨俗曰虎骨其骨大小六枚湊以成掌非塊然一骨也其上並接臂輔兩骨之端其外側之骨名高骨一名鋭骨亦名踝骨俗名龍骨以其能宛屈上下故名曰腕若墜馬手掌著地只能傷腕壅腫疼痛若手背向後翻貼於臂者並躍魚法端之五指之骨名錘骨即各指本節之名也其各指次節名竹節骨若被打傷折五指或翻錯一指並游魚法整之胯骨即髖骨也又名髁骨跌打損傷筋翻足不能直行筋短者腳尖著地骨錯者腎努斜行用騎龍母法整之環跳者髖骨外向之凹其形似臼以納髀骨之上端如杵者也名曰機又名髀樞即環跳穴處也跌打損傷以致樞機錯努青紫腫痛不能步履或行止欹側艱難燕尾母法挫頓之或環跳脫臼筋弛足痿蹇麻木者燕尾子法第一端之或髖骨閃錯及大腿骨一時碎者先用揉法整大腿骨杉籬裹簾法纏縛之後用燕尾子法第二治髖骨閃錯股骨者髀骨上端如杵入如髀樞之臼下端如錘接於䯒骨統名曰股乃下身兩大支通稱也俗名大腿骨墜馬擰傷骨碎筋腫黑紫清涼者先用揉法端之後用杉籬裹簾法膝蓋骨亦名臏骨形圓而扁覆於楗䯒上下兩骨之端內面有筋聯屬其筋上過大腿至於兩肋下過胻骨至於足背如有跌打損傷膝蓋上移者用尺蠖子法第二整之或膝屈不伸膕大筋翻攣者用尺蠖母法端之或膝頭大腫黑紫筋直膕腫疼痛手不可近者用尺蠖子法第一端之或膝骨斜錯股骨一時碎傷者先整其股骨後用尺蠖子法第三治之胻骨即膝下小腿骨俗名臁脛骨者也其骨二根在前者名成骨又名骭骨其形粗在後者名輔骨其形細又俗名勞堂骨若被跌打損傷其骨尖斜突外出肉破血流或砍磕被重物擊壓骨細碎者用揉法整之杉籬裹簾法縛之髁骨者胻骨之下足跗之上兩旁突出之高骨也在內者名內踝俗名合骨在外者為外踝俗名核骨或馳馬墜傷或行走錯誤則後跟骨向前腳尖向後筋翻肉腫疼痛不止者用弄玉法端之跗骨者足背也一名足趺俗稱腳面其骨乃足趾本節之骨也其受傷之因不一或從隕墜或被重物擊壓或被車馬踹砑若僅傷筋肉尚屬易治若骨體受傷每多難治領尾法治之趾者足之指也名以趾者所以別於手也俗名足節其節數與手之骨節同大指本節後內側圓骨努突者一名核骨又名核骨俗呼為孤拐也趾骨受傷多與跗骨相同惟奔走急迫因而受傷者多游魚法治之跟骨者足後跟骨也上承胻輔二骨之末有大筋附之俗名腳攣筋其筋從跟骨過踝骨至腿肚裡上至膕中過臀抵腰脊至項自腦後向前至目眥皆此筋之所達也若落馬墜蹬等傷以致跟骨擰轉向前足趾向後即或骨未碎破而縫隙分離自足至腰脊諸筋皆失其常度拳攣疼痛宜螺旋法治之脈證治法劉宗原曰打撲金刃損傷是不因氣動而病生於外外受有形之物所傷乃血肉筋骨受病非如六淫七情為病有在氣在血之分也所以損傷一證專從血論但須分其有瘀血停積而亡血過多之證蓋打撲墜墮皮不破而內損者必有瘀血若金刃傷皮出血或致亡血過多二者不可同法而治有瘀血者宜攻利之若亡血者兼補而行之又察其所傷有上下輕重淺深之異經絡氣血多少之殊唯宜先逐瘀血通經絡和血止痛然後調氣養血補益胃氣無不效也頃見圍城中軍士被傷不問頭面手足胸背輕重醫者例以大黃等利之後大黃缺少甚者遂以巴豆代之以為不於初時瀉去毒氣後則多致危殆至於略傷手指亦悉以藥利之殊不知大黃之藥惟與有瘀血者相宜其有亡血過多元氣胃氣虛弱之人不可服也戴院使云僕踣不知曰攧兩手相搏曰撲其為損一也因攧撲而迷悶者酒調蘇合香丸灌之因攧撲而損傷宜逐其惡血酒煎蘇木調蘇合香丸或雞鳴散或和氣飲加大黃入醋少許煎或童便調黑神散不用童便用蘇木煎酒調亦得攧撲傷疼酒調琥珀散極佳烏藥順氣散亦可大法固以血之瘀失分虛實而為補瀉亦當看損傷之輕重輕者頓挫氣血凝滯作痛此當導氣行血而已重者傷節折骨此當續節接骨非調治三四月不得平復更甚者氣血內停沮塞真氣不得行者必死急瀉其血通其氣亦或有可治者焉凡打撲傷損者先用手尋揣傷處用藥尉數次整頓其筋骨以敷藥搽之後用杉籬裹簾法骨細碎者別有正副夾縛定之法正夾用杉皮去外重皮約手指大指排肉上以藥敷杉皮上其藥上用副夾用竹片去里竹黃亦如指大疏排夾縛凡打傷跌撲其痛不可近者先用草烏散九鳥散之類之麻藥則麻倒不知疼處或用刀割開或用剪去骨鋒或以手整頓骨筋歸元端正後用夾板夾縛定或箭鏃入骨不出亦可用此藥麻之或鐵鉗拽出或用鑿鑿開取出若人昏沉後用鹽湯或鹽水或鐵醬汁或濃煎茗與服立醒凡骨斷皮破者不用酒煎藥或損在內破皮肉者可加童便在破血藥內若骨斷皮不破可全用酒煎藥服之若只損傷骨未折肉未破者用正骨順氣湯折傷木湯之類凡皮破骨出差曰拔撙捺不入用快刀割皮間些捺入骨不須割肉肉自破後用管爾膏敷貼瘡四傍腫處用敷藥若破而血多出者用手整時最要快便凡平處骨斷骨碎皮不破者只用敷藥藥尉鏝尉若手足曲直等處及轉動處只宜絹包縛令時數轉動不可夾縛如指骨碎斷止用苧麻夾縛腿上用苧麻繩夾縛冬月熱縛夏月冷縛余月漫縛凡傷重其初麻而不痛應拔伸捺正或用刀取開皮二三日後方知痛且先勻氣血凡筋攣筋縮筋翻者摻以蚯蚓膏而後頻用揉法滿腫硬堅者用振挺法輕擊之瘀血聚積或青紫黑色焮熱者以三楞針刺數處出血貼以鯽魚泥生鰍泥之類凡肉破出血不止者以發繩扎住其上閲青筋放五六針青筋不見者以三稜針刺足委中穴血突出高二尺許漸漸如線流於地約升余其人或暈倒或如委頓狀面失色則瘡口出血頓止素問云人有所墜墮惡血留內腹中滿脹不得前後先飲利藥此上傷厥陰之脈下傷少陰之絡刺足內踝之下然骨之前血脈出血刺足跗上動脈不已刺三毛上各一痏見血則已左刺右右刺左善悲驚不樂刺如右方靈樞云身有所傷血出多反中風寒若有所墜墮四肢懈惰不收名曰體惰取小腹臍上三結交陽明太陰也臍下三寸關元也脈經云從高顛仆內有血腹脹滿其脈堅強者生小弱者死破傷之脈若瘀血停積者堅強實則生虛細澀則死若亡血過多者虛弱澀則生堅強實則死皆為脈病不相應故也凡砍刺出血不止者其脈止脈來大者七日死滑細者生靈樞云有所墜墮惡血留內有所大怒氣上而不行下積於脅下則傷肝又中風及有所擊僕若醉入房汗出當風則傷脾又頭痛不可取於腧者有所擊墮惡血在內若肉傷痛未已可側刺不可遠取之也十不治證胸背骨破入肺者縱未即死二七難過左脅下傷透至內者腸傷斷者頭顱骨碎腦蓋傷者小腹下傷內橫骨破者血出盡者肩內耳後傷透內者腰骨壓碎者傷破陰子者脈不實重者敷藥法用蜜或糯米糊或東流水或生薑自然汁或無灰酒或火酒或霹靂酒或釅醋或陳醬汁或童便和散藥為泥雞翎二三十莖縛作刷子掃痛處俟其干更塗如此三四層為度若有肉破處則唯布其四面而露其口兩三日後用柳篦鏟落舊藥換新藥或用藥水泡洗去舊藥亦可惟不可驚動損處藥尉法用木綿布方五寸裹藥一劑以麻絲括定余其絲條尺許浸火酒於砂鍋中定文於文火爐上不令有潮氣須酒色微紅時取三指大青竹筒長五六寸兩頭不留節以所括麻條通竹筒中絡其末令如鼓桴尉患處揉摩數次尉斗烙法先搗爛蔥白一味合定痛散為泥敷於痛處以毛頭紙蘸醋貼藥上燒鐵尉斗烙紙上以傷處覺熱疼口中有聲為度鏝尉法以藥泥攤厚好紙上厚五分更以紙覆其上敷於患處燒鐵鏝子令通紅烙尉其紙上一法以藥泥攤紙上厚五分縱六寸橫四寸從四邊起紙來裹之為一片板先以銅板架火爐上置一片板於其上俟熱透罨尉於患處振梃法振梃木棒也長尺半圓圍三寸五分或麵杖亦可受傷之處氣血凝結疼痛腫硬先用布疊令三重敷患處以此梃輕輕振擊其患處上下四旁使氣血流通得以四散則疼痛漸減腫硬潮消也腰柱法腰柱者以杉木四根制如扁擔形寬一寸厚五分長短以患處為度俱就側面鑽孔以布聯貫之腰節骨被傷錯筍膂肉破裂筋斜傴僂者先以布纏圍患處一二層將此柱排列於脊骨兩旁再以布纏覆柱上數層令端正為要杉籬法杉籬者復逼之器也量患處之長短闊狹曲直凸凹之形以杉木為片以布卷定之酌其片數記其次以布聯編之令不得紊亂有似於籬故名焉手足骨斷骨碎筋斜筋斷者先以布纏之以此籬環抱之再以布纏卷籬上則骨縫吻合堅牢無離綻脫走之患令不動搖為要裹簾以白布為之層纏患處故名裹簾其長短闊狹量病勢用之和蘭醫書精録其事桂川月池先生之譯別有其書故唯舉一二圖而不復贅焉正骨圖解使患者正坐一人坐背後生腰以兩手承枕骨邊腕骨當項指頭並向上面把定要令不動搖醫蹲踞前面以兩手大拇指入患者口中撙牙關盡處四指捧下頦乘勢極力向喉嚨突下更向上突上則雙鉤入上環患者佐者坐如母法醫以右手腕骨捧持腮骨指頭向頰車起大拇指當地倉外面探求牙關盡處自皮上捺下如母法左手受持下頦左傍要令不搖而已使患者開兩踵於臀外而安坐醫在其背後踐開兩腳而直立低頭視患者之額上安右手於額中央翻左手以虎口挾持其項骨指頭用力把定髮際玉枕骨下陷處翻右手載其頤於掌上前後相圍左手自肩用力提之右手應左手之提自下抬之務勿不正左右齊一令右顧三次然後當患者頭後於胸膛以左手按額中央翻右手挾持項骨載頤於左手掌上如前令左顧三次使患者坐如母法一人在患者之前踐開兩腳以兩手搭患者之肩井上邊指頭向肩胛用力推鎮焉醫直立其背後兩手挾定如母法提時左右徐徐令顧以己之呼吸為度自肩至䯛用力施震震法其提上之勢恰如拔頸狀漸伸時當患者腦後於胸膛捺托令不弛以項手代頤手相圍如前法徐徐牽上筋骨抒緩時令左右顧數次使患者坐如母法醫坐其右側立右膝安置右肘於髖上翻掌載患者頤放其上覆左手虎口挾定項骨用力抬上如母法提左顧時右膝載胕而將送之此法為貴人設如其重症猶須前法使患者仰臥醫箕踞其頭上以兩足蹈定患者之肩井翻在手挾項骨右掌勾頤徐徐令顧如子法第一其左顧也用力蹈右肩右顧反是其左右遞互十次使患者正坐醫坐其右側如雁行斜欹右膝跂左踵安置左臀於其跟上用為跗覆左手搭患者肩上掌中當肩井指頭及缺盆大拇指在肩髃後陷處翻右手掌抅持患者肘後用力拽舉如彎弓狀循患者耳後斡旋如轉繅車狀右手拽則左手拇指用力捺肩髃後循耳後斡旋則四指頭用力捺缺盆運轉數次醫坐如母法一人在患者前扶患手其法開兩足而立翻右手把患者之大拇指魚腹翻左手把住患掌背腹隨醫旋轉輕牽慎勿緩弛醫與扶者為掎捔角勢齊一旋轉其法小異母法左手覆住肩井大拇指揣入臑腧陷中以右手虎口向肘逆握患者臑間用力於肩與扶者回轉及其耳後則斜肩屈肘揚之斡旋一次又轉來至耳後則用力於掌捺定臑肉開指頭轉掌順換握徐徐回轉而至脅肋則扶者放手而退醫乘勢而挫頓使患者端坐醫坐其右背後如雁行立右膝以右手輕握患者肘後而徐徐啓之用左手掌插絮團於其脅肋與肘間用指頭推入於腋下團皆入則更用虎口衝上使右手所握之患肘漸切近於脅肋則臑骨發起復其舊尚不去絮團用裹簾如法使患者屈其左肘以掌按其膻中而端坐醫坐右側斜欹左膝以二疊軟布當患手腋下以左手掌抑之以右手握定其腕後以抑腋下手急推倒其手法機發在妙訣焉使患者正坐醫雁行於背後跋扈兩腳以左手撙住患者肩髃以右手把定患者右腕後帶回轉之意徐徐顫掉而拽患者肘高舉而跨飛右腳於患者膝前乘勢回轉其回轉也拽於患者膝頭至於脅下沿耳後高舉令不弛斡旋數次如母法使患者正坐醫立其右背後雁行跋扈兩腳左手覆患者肩井四指當缺盆雲門上大拇指當臑腧穴緊固捺定右手把住患者右腕乘拽勢退闢右足而拽倒患者載其右肩髃於左足跗上左手猶在缺盆肩井而抑定屈右足欹左膝以跗扇翻其所載肩髃其訣也以所把住右手捏撩扇翻要與足跗一齊使患者正立醫立患者背後如雁行欹右膝跂左踵如母法左手大拇指揣入臑腧陷處四指覆肩上右手把住其肘後徐徐動搖乘舉勢有拗之光景以推出為度使患者正立醫立背後如母法以左手掌覆肩髃拇指當臑腧穴四指頭當缺盆雲門上右虎口挾持患者肘後如母法自腋下輕控於背後沿耳後斡旋將舉回則左手拇指推臑腧穴至耳後則掌中推髃骨上轉向前則推缺盆下每斡旋互推三處手裡在妙訣焉一名三折車轉使患者正立醫對立立左膝右手搭患者肩井上邊四指至肩胛如鉤引於前狀左手抬握患者肘頭為微回意而捺背後則右手拽之往來數次以缺盆骨露起為度使患者正立醫在患肘前對坐其間尺余立左膝於患者右側微側身向患者之左右手握定患手腕後內側左手掌上承載肘尖伸首合住頭顱於患者右肩髃下膊上令患者不動搖以所握手捺屈患手於患者頤下胸邊左旋向外回轉而拽伸之合住肩髃額顱與承載肘尖左掌握拽腕後右手者其期要一齊焉使患者俯臥醫對其右側立左膝跂右踵跗臀於跟上以右手握定患手掌後當左手於患者腋下用力於腕急速推倒患者倒時醫捩左手㬹以足澤受患手肘尖以右手微撓其腕骨於外曳定於內焉使患者正立以帨巾𥈆其兩眼結之腦後又以巾卷其患手腕後寸口以繩索及絹帶約六七尺許扎住其上系其末於楹佐者一人在患者左側欹坐以兩手抱持之醫雙手握麵杖極力自頭上打繩索中央勢如擊弦上則肘骨頓復使患者負楹若牆正立醫對立於其傷肘斜右膝伸右手以掌按住患者右乳上以左手握患手腕後外側右掌捺乳上則左手帶向內回轉之意而徐徐隨呼吸拽伸焉依母法回轉臂肘頗緩半伸半屈如人字樣勿令伸承肘左掌之大拇指食指挾肘骨帶掬之意徐徐回轉臂骨則肘骨合縫使患者正立而覆患手醫對立其前側右手上大拇指下四指把住患手四指中節仰左手上大拇指下四指挾其腕骨不緩不緊乘勢而右旋拽伸之登時以所挾腕骨之大拇指摎聚皮肉於腕骨上則腕前筋脈為之不攣急令骨節易運轉而轉大拇指推入陽池穴陷處其運轉也要以挾腕骨手衝上以握四指手曳下左右有引訣並上下之意而骨節寬容焉使患者正坐醫對坐側右手上拇指下食指把定患指頭左手亦上大指下食指挾患節上運轉如躍魚法使患者正立醫踞其背後跂左踵跋出右腳生腰直身當左掌於患者胛骨四指頭鉤胛骨上稜骨以掌側骨揣捺肩胛側骨右手入患者腋下屈肘伸五指衡患者乳上張肘腕後承定患者肘後令伸肘醫用力於曲肘自肩捺上托送患者肘於頤邊乘其捺送之勢左手從之指頭用力捺鎮胛骨掌側骨亦用力捺送其胛骨於外送極而右手微帶在旋意自肩用力拽來規以患者之體其拽來右手鉤承之其推送左手以整頓為要使患者叉手盤立醫坐其背後立右膝跂左踵置臀於跟上右腕當脾俞其指頭向脅肋骨橫推之其肘尖架住膝頭以為用力地插入左手於腋下屈臂如軒伸五指橫左乳上掌後腕骨在胸肋擁抱之使患者體微仰而撓於後右手承載患者體以微推出意轉回之其回也左手從肩右手從腰徐徐為之勿疾速焉使患者正立醫對立於患者左胸斜欹右膝右手插入患者左腋下橫其腕於背脾俞拗中勾定於患體當左手腕骨於兩乳間拗中伸四指壓之帶母法之意從其呼吸捺送胸肋數回與母法前後相反耳使患者正立佐者一人在前跋扈以兩手搭住患者兩肩髃上醫蹲踞患者背後中央跗兩手肘尖於兩膝頭兩腕骨橫當胛骨下四指斜向兩腋擁之佐者撙右肩則醫捺右胛承之撙左肩則捺左胛承之如被靡風狀左右數次使患者叉手正立醫立在背後跂兩踵安住臀於跟上插入兩手於腋下合抱患者叉手下以胸膺切當患者膏肓下邊兩拘向上反張令患者背乘於胸上摩軋之戾身左轉又戾身右轉左右挾轉六七回使患者交臂於胸前而正立醫在其背後跂兩踵跗臀於跟上用兩膝頭緊挾患者兩骨疌骨兩手插入兩腋下以鉤上之生腰左之右之戾回動搖而患處平直為度使患者正立醫在其左背後立右膝肢兩踵跗臀於跟上用右手腕骨當脊骨患處伸五指向右脅肋架住其肘尖於膝頭以為用力之地左手插入左腋下屈肘伸五指橫胸上玉堂華蓋張肩抱患者體右腕骨捺轉脊骨其轉也令其體斜仰使患者俯臥而伸腳屈右膝醫立左腰側開兩腳跋入其右足於患者胯間屈腰下左手探求腰間脊骨之合縫處逆掌押其骨尖下右手持膝頭屈上如燕尾法乘勢回轉曳伸之當其回轉曳伸時以左掌緊捺骨尖要在中其肯綮焉使患者正立醫立其腰後患處在右則拔入左腳於患者右側右手掌橫當腰間尖骨上其指頭向外插入左手於右腋下伸五指橫當右乳上如抱持定使患者形偃仰極力於右掌乘以腕骨動搖之勢頓挫推轉於前當其推出右手如挽患者體跨越於右腳相代於左腳與手如一齊使患者上其右髀側臥而半屈其膝醫立其腰後跋扈折腰以左手掌捺罨髀樞尖骨右手屈四指鉤住膝頭舉試之要髀骨尖頭入於掌心若不入則更為焉更屈承舉膝頭托送患者乳下季肋間乘勢向下頓挫回轉之當其回轉曳伸也左掌緊推髀樞尖帶自外面向於背之意以掌推臀則應機而復焉使患者側臥如母法佐者與醫斜向立屈腰持患者踵與䯒骨從醫運轉無用自意譬如母法立於腰後屈腰下一手掌於髀樞骨尖要緊押按定當運轉令髀骨尖不突起一手承持膝頭如母法屈上膝頭於季肋邊徐回轉三次乘勢挫頓以歸窠佐者亦隨之曳伸其踵矣使患者側臥如母法插入疊被於裹簾所縛傷股間佐者對立患者面前兩手持被前端醫右手斜合持補後端而提舉之左手緊捺髀骨尖回轉如母法其右手不及腳只被中將送之也亦要徐遲其曳也乘勢而復其位使患者仰臥醫對坐其右腳傍立左膝生腰左掌覆定患者膝蓋骨上右手緊握踵徐徐捺屈腳於患者胸前衝入跟於股間勢射會陰頓回轉而拽伸焉其登也用力於覆蓋骨掌其曳來也使蓋骨不頓於地向上而以握踵右手回轉拽伸數回使患者坐醫對坐患腳右前而立左膝右手握定踝骨左掌搭患者項用其四指頭鉤壓左枕骨邊使患者頓首於前乘其勢右手拽定腳使患者伸出患腳於前醫對其膝右傍而坐一手握定腳跟一手屈掌用虎口鉤住上移膝蓋骨上際按撫下之下之也以握跟手屈伸其膝如母法蓋骨稍稍下而歸元先以杉籬裹簾法纏縛股骨傷處佐者一人以兩手抱持裹簾上醫對坐如母法用小被載患腳踵跟左手覆膝頭如母法以右手徐拽其被則佐者抱持而相應焉使患者跋出右膝於前而坐醫傍其膝外側與患者並坐倒左手以虎口挾定踝骨覆右手握患足指令其跟著地帶以四指上鉤以魚腹下托之意而旋轉之左手乘其勢令踝骨上下恰如弄玉狀則復其舊使患者伸右腳於前而坐醫對坐於其足心左手掌心抅住其跟骨泄之要令不弛右手上大拇指把住足四指推出其跗左旋回轉而拽伸之左掌中之跟左旋回轉如螺殼形使患者伸右腳於前而坐醫對坐於其足心左手掌心抅住其跟骨泄之要令不弛右手上大拇指把住足四指推出其跗左旋回轉而拽伸之左掌中之跟左旋回轉如螺殼形使患者立右膝仰出足跗而坐醫傍其外側立左膝斜與患者並坐屈左手四指頭橫當其足心湧泉穴而捺上覆右手以腕骨當其足胕上握四指捺屈而向於外回轉其屈壓也捺跗上腕則自上推下捺湧泉指則自下推上皆極力回轉焉接骨經驗方麻藥部整骨麻藥草烏三分當歸白芷各二分半上末每服五分熱酒調下麻倒不知痛然後用手如法整理九鳥散蔓陀羅花一錢露蜂房三分五釐鳩糞三分五釐反鼻一錢一方無反鼻上四味細末以麻酒飲服實人九分虛人八分昏沉不醒者與濃煎茗一碗為妙草烏散治傷骨節不歸窠者用此麻之然後下手整頓白芷川芎木鱉子豬牙皂角烏藥半夏紫金皮杜當歸川烏各二兩舶上茴香草烏各一兩木香半兩上為細末諸骨碎骨折出臼者每服一錢好酒調下麻倒不知疼處尉藥部艾腸泥治打撲筋攣骨閃挫及久年打撲痛藏瓜姜糟熟地黃各六十錢生薑擦二十錢艾十五錢上四味內擂盆研爛為泥攤好厚紙上再以紙覆其上敷患處燒鐵鏝烙尉紙上黃酒散尉骨節疼痛飛羅面二合雞卵三枚樟腦二錢上三味以好酒五合文火煮蘸白布蒸尉數次蒲黃散馬鞭草蒲黃烏頭各四錢上無灰酒或霹靂酒煉為泥塗患處厚六七分以絹或紙覆之用火針尉其上馬鞭散生地黃蒲黃馬鞭草上三味定痛散治一切打撲損傷定痛消腫舒筋和絡當歸川芎芍藥桂枝各一錢三奈三錢麝香三分紅花五錢紫丁香根五錢升麻一錢防風一錢上為末以蔥白汁和為泥敷痛處以毛頭紙蘸醋貼藥上燒鐵尉斗烙紙上以傷處覺熱疼口中有聲為度尉烙泥治打撲及肩臂手足不可屈伸者酒糟七十錢冬青葉五十錢桂枝合歡皮生地黃各七錢上先細銼冬青葉三味為末和糟入臼杵為泥團之如𦸉餅大以紙作盂盛藥於其中置患處烙其上國壽散百草霜十五錢飛羅面二十錢生薑汁五錢上以酒和勻貼紙上以火針尉其上洎夫藍湯打撲傷損腫痛諸般之尉藥正骨家常用忍冬三錢黃柏二錢紅花四分硝石一錢三分樟腦八分當歸四分川芎六分桂枝八分地黃五分上以布裹一劑浸火酒中煮令色微紅尉患處膏藥部蚯蚓膏緩筋攣筋縮骨關強者蚯蚓四十八錢水洗去泥淨上清酒三十二錢麻油百九十二錢令相和內蚯蚓文火煮以水氣盡為度管爾膏療一切金瘡止痛方一名百效油麻油一合椰子油四錢乳香一錢六分小麥一合上小麥浸麻油三日煮令焦漉去麥渣入椰乳煉收敷藥部一白散治打撲傷痕紫黑有瘀血流注無熱者半夏上末薑汁調傅鯽魚泥治折傷肉爛腫痛者生鯽魚上去腸骨為泥塗患處生鰍泥治折傷肉爛焮熱者泥鰍上擂爛為泥塗患處茴香酒茴香樟腦紅花上三味浸火酒納磁器封固三十日雞舌丹不問新舊諸般打撲杏蔭齊常用此方桂心末四十錢丁子一錢肉桂二錢糯米二合上細末用密絹羅廚篩出陳醬汁和勻雞翎掃搽患處翻風散治手掌後軟骨高起不痛不膿無寒熱者輕粉一錢山椒末二錢上二味研羅為細末水調塗遍救急奇方治諸傷瘀血不散野苧葉上於五六月取收野苧葉擂爛塗金瘡上如瘀血在腹用順水擂爛服即通血皆化水以死豬血試之可驗秋月恐無葉可早收之黑龍散治墜馬或高墜腰腳腫痛苦瓠霜大者瓣共霜鹽梅上二味燒存性清酒或火酎和調摺痛處赤地利散治打撲傷損青紫腫硬數日不減者赤地利黃柏石灰上三味為細末釅醋和勻雞翎掃塗楊梅散治打撲腫硬痛黃柏楊梅皮胡椒上三味為細末火酒和勻為泥搽塗患處假母布剌酒久年打撲痛火酒四百八十錢片腦十錢上搜令相得納壺煮溶封其口埋土中百日取出羽掃患處琥珀散療手足閃挫方酒蘖二十錢松脂四十錢雞子上為末糊調塗損處以柳皮或蘗皮覆藥上復以綿布卷扎如此每日一度無名散諸般攧跌打撲楊梅皮鹿角霜石灰韭汁浸無名異各等分上酢或酒和調為泥攤紙上以罨患處玳瑁光治墜馬折傷打撲一切骨節疼痛不治之症奇驗方阿膠二錢上以生薑汁煮膠煬消合生姜渣攪令相得適寒溫臨臥敷患處冷不成功以綿被覆藥上半時許覺熱為知生鱸泥治打撲生鱸魚砂糖上二味杵成泥研勻敷痛處麟血散折傷奇方乳香麟血紅花麵粉上熱酒醋和勻青泥療打撲接骨木葉上擂爛取自然汁搽患處綴藥耳鼻傷損落者用人發入陽城確以鹽泥固濟蝦過為末乘急以所傷耳鼻蘸藥安綴故處以軟絹縛定消毒定痛散治跌撲損傷腫硬疼痛無名異木耳炒川大黃各五錢共為末蜜水調塗如內有瘀血砭去敷之若腐處更用膏藥敷之尤好麻肌散川烏草烏南星半夏川椒上末唾調搽之洗藥部散瘀和傷湯治一切碰撞損傷瘀血積聚番木鱉油煠去毛紅花生半夏各五錢骨碎補甘草各三錢蔥須上水五碗煎滾入醋二兩再煎十數滾薰洗患處一日十數次蒴藋煎療打撲疼痛腫不消忍冬蒴藋接骨木艾石菖蓮葉折傷木各一兩食鹽一合上七味以水二升煎取一升洗損處片腦水樟腦上大寒節取井花水腦一味盛麻囊浸三十日丸散部雞鳴散治從高墜下及木石所壓凡是傷損血瘀凝積氣絶死煩躁頭痛不得叫呼並以此藥利去瘀血治折傷神妙大黃一兩酒蒸桃仁二十粒去皮尖上研細酒一碗煎至陸分去渣雞鳴時服次日取下瘀血即愈若氣絶不能言急擘口開用熱小便灌之即愈當歸導滯散治打撲損傷落馬墜車瘀血大便不通紅腫青黯疼痛昏悶畜血內壅欲死大黃一兩當歸二分半麝香少許上三味附麝香別研外為極細末入麝香令勻每服三錢熱酒一盞調下如前內瘀血去或骨節傷折疼痛不可忍以定痛接骨紫金丹治之本命散治刀刃所傷及從高墜下木石壓損瘀血凝積心腹痛大小便不通水蛭用石灰拌熳火炒令黃色半兩黑牽牛二兩上末每服二錢熱酒調下約行四五里再用熱酒調黑牽牛末二錢催之須下惡血成塊以盡為度八釐散治跌打損傷接骨散瘀蘇木一錢鐵砂一錢自然銅三錢醋焠七次乳香三錢沒藥三錢血竭三錢麝香一分紅花一錢丁香五分番木鱉一錢油煠去毛上共為細末黃酒溫服童便調亦可黑藥方治打撲傷損幹過臘魚霜二錢山椒為霜二錢上為末溫酒送下當合丸治打撲傷損兼下血百草霜十錢赤豆炒至紅色為度一錢萍蓬黑炒五錢蝮蛇酒炙一錢上末溫酒送下味噌汁亦佳疏血丸此藥止血開胃百草霜三錢好阿膠蛤粉炒成珠藕節側柏葉茅根當歸上共為細末煉蜜為丸如梧桐子大每服五錢早晚陳酒送下塞鼻丹此丹治跌打損傷鼻中流血不止神氣昏迷牙齒損傷虛浮腫痛者及一切衄血之證皆可用之硃砂麝香丁香烏梅肉川烏草烏當歸三奈各一錢乳香皂角七分上共為細末用獨頭蒜泥為丸以絲棉包裹塞於鼻中回陽玉龍丸專敷跌打損傷氣虛寒冷草烏二錢炒南星一兩煆軍姜一兩煨白芷一兩赤芍一兩炒肉桂五錢上共為末蔥湯調搽熱酒亦可六味地黃丸傷損之證肌肉作痛者乃榮沖氣滯所致宜用後元通氣散筋骨間作痛者肝腎之氣傷也熟芐八兩山萸肉四兩去核懷山藥四兩牡丹皮三兩澤瀉三兩茯苓三兩上共為末煉蜜為丸如梧桐子大空腹白湯服三錢蘇合香丸沉香木香丁香白檀麝香安息香酒熬膏香附子白朮蓽茇訶子肉硃砂犀角鎊各一兩乳香片腦蘇合香油入息香膏內各五錢上將各味咀成片為細末入腦麝安息香蘇合香油同藥攪勻煉蜜為丸每丸重一錢用蠟包裹每用大人一丸小兒半丸去蠟皮以生薑自然汁化開擦牙關別煎薑湯少許調藥灌下神效鷲霜散治一切久年打撲痛鷺去觜足翅腸以紅花花人參一兩填腹上納土器鹽泥封固燒存性為細末熱酒送下一錢黑神散黑豆去皮炒半斤熟乾地黃酒浸當歸去蘆酒製肉桂去粗皮乾薑炮甘草炙芍藥蒲黃各四兩上為細末每服二錢酒半盞童子小便半盞不拘時煎調服湯藥部復元活血湯治從高墮下惡血凝結腫硬疼痛不可忍者柴胡五分當歸穿山甲炮栝蔞根各三錢甘草紅花各二分桃仁去皮尖五十個大黃酒浸一兩上杵桃仁研爛余藥銼如麻豆大每服一兩水二鍾酒半盞煎至七分去渣食前溫服以利為度斂血劑治因金刃傷而動經脈卒暈欲死者故産後血暈及打撲動經脈者皆主之萍蓬桂枝木香當歸黃芩白朮黃連甘草川芎丁子地黃檳榔茯苓大黃人參上十五味細銼盛布囊漬麻沸湯須臾絞頓服清上瘀血湯治上膈被傷者羌活獨活連翹桔梗枳殼赤芍藥當歸梔子黃芩甘草川芎桃仁紅花蘇木大黃上生地黃煎和老酒童便服清下破血湯治下膈被傷者柴胡川芎大黃赤芍藥當歸黃芩五靈脂桃仁枳實梔子赤牛膝木通澤蘭紅花蘇木上生地黃煎加老酒童便和服正骨順氣湯杏蔭齊諸般打撲傷損通用之當歸川芎白芍藥蒼朮厚朴茯苓半夏白芷枳殼桔梗乾薑桂枝麻黃甘草羌活蜜香上姜水煎赤地利湯治打撲奇方赤地利上水煎頓服一方燒存性糯米粉中停溫酒送下鰵魚湯治打撲折傷鰵魚二錢當歸六分川芎五分大黃四分上四味以水二合煮取二分日二服服之則患處覺痛久者服十餘劑愈神效加減蘇子桃仁湯治瘀血內聚心經瘀熱大腸不燥者蘇子二錢半末紅花一錢桃仁炒麥門橘紅各三錢赤芍竹茹當歸各二錢酒洗上水三鍾煎一鍾渣二鍾煎八分溫服犀角地黃湯撞撲胸膛吐血者犀角生地黃酒浸別搗牡丹皮白芍藥各等分上水煎桃仁承氣湯大黃芒硝桃仁桂枝甘草上水煎服以利為度抵當湯水蛭虻蟲各三十枚去翅足大黃一兩酒浸桃仁三十枚去皮尖上以水五升煎取三升去滓溫服一升不再服調經散川芎當歸芍藥黃耆各一錢半青皮烏藥陳皮熟地黃乳香別研茴香各一錢上作一服水二鍾煎至一鍾不拘時服折傷木湯折傷木當歸川芎地黃大黃芍藥澤瀉枳實茯苓蒲黃甘草上十一味四物湯當歸三錢川芎白芍熟地各二錢上水煎百合散川芎赤芍藥當歸百合生地黃側柏葉荊芥犀角丹皮黃芩黃連梔子鬱金大黃各一錢上水煎加童便和服加減承氣湯大黃朴硝各二錢枳實厚朴當歸紅花各一錢甘草二分上水酒各半煎服玉燭散生地黃當歸川芎赤芍藥大黃酒浸芒硝上引用生薑水煎
